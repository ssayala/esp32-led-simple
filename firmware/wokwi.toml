[wokwi]
version = 1
# Built by `pio run -d firmware -e wokwi`. Must be the wokwi env, not esp32-s3:
# it's the no-PSRAM image and the only one with the serial console compiled in
# (esp32-s3 sets -DCONSOLE_ENABLED=0). Re-run the build before simulating so
# these point at fresh artifacts. Paths are relative to this file (firmware/).
firmware = '.pio/build/wokwi/firmware.bin'
elf = '.pio/build/wokwi/firmware.elf'
